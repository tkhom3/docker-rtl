name: Create Release, Build and Deploy Image

on:
  push:
    branches:
      - 'main'
      - 'beta'
  pull_request_target:
    branches:
      - 'main'
      - 'beta'
    types: [closed]

permissions:
  actions: write
  contents: write
  issues: write
  id-token: write
  pull-requests: write

jobs:
  build-and-release-image:
    if: github.actor == 'dependabot[bot]' || github.event_name == 'push'
    uses: tkhom3/gha-workflows/.github/workflows/build-and-push-image.yml@01efdd07d084c97e79ae8ebda78d84d9e15b0cb7 # v1.0.17
    secrets: inherit
