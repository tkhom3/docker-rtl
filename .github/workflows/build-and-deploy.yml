name: Create Release, Build and Deploy Image

on:
  push:
    branches:
      - 'main'
      - 'beta'
  pull_request_target:
    branches:
      - 'main'
      - 'beta'
    types: [closed]

permissions:
  actions: write
  contents: write
  issues: write
  id-token: write
  pull-requests: write

jobs:
  build-and-release-image:
    if: github.actor == 'dependabot[bot]' || github.event_name == 'push'
    uses: tkhom3/gha-workflows/.github/workflows/build-and-push-image.yml@aa66c6cf2188919b4e79194010e779c6c6833b27 # v1.0.13
    secrets: inherit
